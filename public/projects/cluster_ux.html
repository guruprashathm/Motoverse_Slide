<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: system-ui, sans-serif;
  }

  /* Click-to-load splash */
  #splash {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; background: #080b0e; z-index: 10;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #splash:hover { background: #0f1318; }
  #splash .icon { font-size: 64px; opacity: 0.7; }
  #splash .label {
    font-size: 13px; color: rgba(148,163,184,0.6);
    text-transform: uppercase; letter-spacing: 0.15em;
  }
  #splash .btn {
    padding: 10px 28px; border-radius: 999px;
    background: rgba(249,115,22,0.12);
    border: 1px solid rgba(249,115,22,0.4);
    color: #f97316; font-size: 13px;
    letter-spacing: 0.08em; cursor: pointer;
  }

  /* Scaled iframe container */
  .scaler {
    position: absolute; top: 0; left: 0;
    width: calc(100% / 0.70);
    height: calc(100% / 0.70);
    transform: scale(0.70);
    transform-origin: top left;
    display: none;
  }
  iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }
</style>
</head>
<body>

  <div id="splash" onclick="loadApp()">
    <div class="icon">🏍️</div>
    <div class="label">K1G / L1A — Vehicle Cluster UX</div>
    <div class="btn">▶ Launch Demo</div>
  </div>

  <div class="scaler" id="scaler">
    <iframe id="frame" allowfullscreen></iframe>
  </div>

<script>
  function loadApp() {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('frame').src = 'http://10.197.103.7:5173/';
      document.getElementById('scaler').style.display = 'block';
    }, 300);
  }
</script>
</body>
</html>
