<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Canvas Tent Reveal</title>
    <!-- Tailwind CSS for high-fidelity styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for crisp icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #080a14;
            color: #e2e8f0;
            overflow: hidden;
        }

        .cyber-font {
            font-family: 'Orbitron', sans-serif;
        }

        /* Ambient glowing effects */
        .neon-glow-container {
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.15);
        }

        /* Glassmorphism panel styling */
        .glass-panel {
            background: rgba(13, 17, 33, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Scanline filter for the canvas overlay */
        .scanlines {
            position: relative;
            overflow: hidden;
        }
        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            z-index: 10;
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between p-4 md:p-8">

    <!-- Simple cyber-styled header -->
    <header class="w-full max-w-4xl mx-auto flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <span class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="cyber-font text-xs font-bold tracking-[0.2em] text-emerald-400">TENT INTERACTION LAB</span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Sound controller -->
            <button id="soundToggle" class="flex items-center gap-2 bg-slate-900/80 border border-slate-800 hover:border-emerald-500 hover:text-emerald-400 py-1 px-3 rounded-lg text-xs transition-all">
                <i id="soundIcon" class="fa-solid fa-volume-xmark"></i>
                <span class="font-bold tracking-wider uppercase">Mute</span>
            </button>
        </div>
    </header>

    <!-- Centered primary interactive zone -->
    <main class="flex-grow w-full max-w-4xl mx-auto flex flex-col justify-center items-center my-4">
        
        <div class="w-full glass-panel rounded-2xl overflow-hidden neon-glow-container relative flex flex-col">
            
            <!-- Context & Interaction Instructions -->
            <div class="flex justify-between items-center px-6 py-4 bg-slate-950/90 border-b border-slate-900 z-10">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-campground text-emerald-400 animate-bounce"></i>
                    <h2 class="cyber-font text-sm font-bold tracking-wider text-slate-200">INTERACTIVE TENT SHIELD</h2>
                </div>
                <div class="text-xs text-slate-400 flex items-center gap-3">
                    <span class="hidden sm:inline-block"><i class="fa-solid fa-hand-pointer text-cyan-400"></i> Click, Drag, or Swipe Flaps to Reveal</span>
                </div>
            </div>

            <!-- Canvas Container -->
            <div class="relative w-full h-[400px] md:h-[520px] bg-slate-950 scanlines cursor-grab active:cursor-grabbing" id="canvasContainer">
                <canvas id="tentCanvas" class="absolute inset-0 w-full h-full block"></canvas>
                
                <!-- Dynamic Interactive Hint Floating Bubble -->
                <div id="interactivePrompt" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900/90 border border-slate-700 text-slate-200 px-5 py-3 rounded-xl text-center shadow-2xl z-20 pointer-events-none text-xs flex items-center gap-3 transition-opacity duration-500">
                    <div class="w-2.5 h-2.5 bg-cyan-400 rounded-full animate-ping"></div>
                    <span>Swipe left/right or click the tent flaps to open and view the cockpit underneath!</span>
                </div>
            </div>

            <!-- Controls bar centered beneath canvas inside the frame -->
            <div class="p-4 bg-slate-950/60 border-t border-slate-900/80 grid grid-cols-3 gap-3">
                <button id="openAllBtn" class="bg-cyan-950/40 border border-cyan-800/60 hover:border-cyan-400 text-cyan-400 font-bold tracking-wider py-2 px-3 rounded-lg text-xs uppercase transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-door-open"></i> Open Both
                </button>
                <button id="resetTentBtn" class="bg-emerald-950/40 border border-emerald-800/60 hover:border-emerald-400 text-emerald-400 font-bold tracking-wider py-2 px-3 rounded-lg text-xs uppercase transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-rotate-left"></i> Reset Tent
                </button>
                <button id="closeAllBtn" class="bg-rose-950/40 border border-rose-800/60 hover:border-rose-400 text-rose-400 font-bold tracking-wider py-2 px-3 rounded-lg text-xs uppercase transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-door-closed"></i> Close Both
                </button>
            </div>
            
        </div>
    </main>

    <!-- Elegant minimal bottom bar -->
    <footer class="w-full max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center text-[11px] text-slate-500 gap-2 z-20">
        <div>INTERACTIVE FLAP PEEL PHYSICS SHIELD</div>
        <div class="cyber-font flex gap-4 text-slate-400">
            <span>FLAPS ACTIVE</span>
            <span>TARGET FPS: 60</span>
        </div>
    </footer>

    <script>
        // Simulation and interaction state
        const state = {
            // Flap open percentages (0 = fully shut, 1 = fully open/revealed)
            leftFlapOpen: 0,
            rightFlapOpen: 0,
            
            // Targets for smooth interpolation (snapping/spring behavior)
            targetLeftFlap: 0,
            targetRightFlap: 0,
            
            // Drag tracking details
            isDragging: false,
            dragPart: null, // 'left', 'right', or null
            startX: 0,
            startY: 0,
            startLeftVal: 0,
            startRightVal: 0,
            
            // Audio elements
            soundEnabled: false,
            audioCtx: null,
            rumbleOsc: null,
            rumbleGain: null,
            time: 0
        };

        // Initialize Canvas
        const canvas = document.getElementById('tentCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const promptBubble = document.getElementById('interactivePrompt');
        
        // Control buttons
        const openAllBtn = document.getElementById('openAllBtn');
        const resetTentBtn = document.getElementById('resetTentBtn');
        const closeAllBtn = document.getElementById('closeAllBtn');
        const soundToggle = document.getElementById('soundToggle');
        const soundIcon = document.getElementById('soundIcon');

        // Scales canvas accurately for Retina / mobile / high-DPI displays
        function resize() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        // Initializes synthesizer components for low engine humming and zipper slides
        function initAudio() {
            if (state.audioCtx) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                state.audioCtx = new AudioContext();
                
                // Synth motor engine hum underneath
                state.rumbleOsc = state.audioCtx.createOscillator();
                state.rumbleGain = state.audioCtx.createGain();
                state.rumbleOsc.type = 'sawtooth';
                state.rumbleOsc.frequency.setValueAtTime(32, state.audioCtx.currentTime); 
                
                const filter = state.audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(90, state.audioCtx.currentTime);

                state.rumbleOsc.connect(filter);
                filter.connect(state.rumbleGain);
                state.rumbleGain.connect(state.audioCtx.destination);
                
                state.rumbleGain.gain.setValueAtTime(0, state.audioCtx.currentTime);
                state.rumbleOsc.start();
            } catch (err) {
                console.warn("Web Audio not supported on this browser.");
            }
        }

        // Generates zipper friction sound effect bursts
        function playZipperSound() {
            if (!state.soundEnabled || !state.audioCtx) return;
            try {
                const bufferSize = state.audioCtx.sampleRate * 0.06;
                const buffer = state.audioCtx.createBuffer(1, bufferSize, state.audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / bufferSize;
                    data[i] = (Math.random() * 2 - 1) * Math.sin(t * 120) * (1 - t);
                }
                
                const noise = state.audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = state.audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(3200, state.audioCtx.currentTime);
                filter.Q.setValueAtTime(4, state.audioCtx.currentTime);
                
                const gain = state.audioCtx.createGain();
                gain.gain.setValueAtTime(0.12, state.audioCtx.currentTime);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(state.audioCtx.destination);
                noise.start();
            } catch (e) {}
        }

        // Modulates hum volume dynamically based on how much tent space is unpeeled
        function updateBackgroundHum() {
            if (!state.soundEnabled || !state.rumbleGain || !state.audioCtx) return;
            const revealFactor = (state.leftFlapOpen + state.rightFlapOpen) / 2;
            state.rumbleGain.gain.setTargetAtTime(revealFactor * 0.15, state.audioCtx.currentTime, 0.1);
        }

        // Handles Sound Toggle actions
        soundToggle.addEventListener('click', () => {
            state.soundEnabled = !state.soundEnabled;
            if (state.soundEnabled) {
                initAudio();
                if (state.audioCtx && state.audioCtx.state === 'suspended') {
                    state.audioCtx.resume();
                }
                soundIcon.className = "fa-solid fa-volume-high text-emerald-400";
                soundToggle.querySelector('span').innerText = "On";
            } else {
                soundIcon.className = "fa-solid fa-volume-xmark text-slate-500";
                soundToggle.querySelector('span').innerText = "Muted";
                if (state.rumbleGain) {
                    state.rumbleGain.gain.setValueAtTime(0, state.audioCtx.currentTime);
                }
            }
        });

        // Helper to convert mouse/touch positions considering scale factors
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / (canvas.width / (window.devicePixelRatio || 1));
            const scaleY = rect.height / (canvas.height / (window.devicePixelRatio || 1));
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) / scaleX,
                y: (clientY - rect.top) / scaleY
            };
        }

        // Triggered upon initial click or touchscreen tap
        function handleStart(e) {
            initAudio();
            if (state.audioCtx && state.audioCtx.state === 'suspended') {
                state.audioCtx.resume();
            }

            const w = canvas.width / (window.devicePixelRatio || 1);
            const pos = getCoords(e);
            const cx = w / 2;

            state.isDragging = true;
            state.startX = pos.x;
            state.startY = pos.y;
            state.startLeftVal = state.leftFlapOpen;
            state.startRightVal = state.rightFlapOpen;

            // Determine if the user is grabbing the left flap side or the right flap side
            if (pos.x < cx) {
                state.dragPart = 'left';
            } else {
                state.dragPart = 'right';
            }

            // Hide instruction bubble
            promptBubble.style.opacity = '0';
        }

        // Triggered upon dragging mouse or swiping finger across viewport
        function handleMove(e) {
            if (!state.isDragging) return;
            const pos = getCoords(e);
            const dx = pos.x - state.startX;
            const w = canvas.width / (window.devicePixelRatio || 1);
            const maxPeelDist = w * 0.35; // Maximum distance to slide open

            if (state.dragPart === 'left') {
                // Moving left peels left flap further back
                const deltaFactor = -dx / maxPeelDist;
                const newVal = Math.min(1.2, Math.max(0, state.startLeftVal + deltaFactor));
                if (Math.abs(newVal - state.leftFlapOpen) > 0.02) {
                    playZipperSound();
                }
                state.leftFlapOpen = newVal;
                state.targetLeftFlap = newVal;
            } else if (state.dragPart === 'right') {
                // Moving right peels right flap further back
                const deltaFactor = dx / maxPeelDist;
                const newVal = Math.min(1.2, Math.max(0, state.startRightVal + deltaFactor));
                if (Math.abs(newVal - state.rightFlapOpen) > 0.02) {
                    playZipperSound();
                }
                state.rightFlapOpen = newVal;
                state.targetRightFlap = newVal;
            }
        }

        // Triggered upon releasing click or lifting finger
        function handleEnd() {
            if (!state.isDragging) return;
            state.isDragging = false;

            // Simple snapping/frictional threshold system
            // If flap is open > 40%, automatically glide/snap it to 100% (fully open)
            if (state.dragPart === 'left') {
                if (state.leftFlapOpen > 0.4) {
                    state.targetLeftFlap = 1;
                } else {
                    state.targetLeftFlap = 0;
                }
            } else if (state.dragPart === 'right') {
                if (state.rightFlapOpen > 0.4) {
                    state.targetRightFlap = 1;
                } else {
                    state.targetRightFlap = 0;
                }
            }
            state.dragPart = null;
        }

        // Handle quick click/tap toggles
        canvas.addEventListener('click', (e) => {
            // If it was a fast click without dragging
            const dx = Math.abs(state.startX - state.startX);
            if (dx < 5) {
                const w = canvas.width / (window.devicePixelRatio || 1);
                const pos = getCoords(e);
                const cx = w / 2;
                
                if (pos.x < cx) {
                    // Toggle left flap
                    state.targetLeftFlap = state.targetLeftFlap > 0.5 ? 0 : 1;
                } else {
                    // Toggle right flap
                    state.targetRightFlap = state.targetRightFlap > 0.5 ? 0 : 1;
                }
                playZipperSound();
                promptBubble.style.opacity = '0';
            }
        });

        // Event listeners binding
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, { passive: false });
        window.addEventListener('touchmove', (e) => { handleMove(e); }, { passive: true });
        window.addEventListener('touchend', handleEnd);

        // Event handlers for control console
        openAllBtn.addEventListener('click', () => {
            state.targetLeftFlap = 1;
            state.targetRightFlap = 1;
            playZipperSound();
            promptBubble.style.opacity = '0';
        });

        closeAllBtn.addEventListener('click', () => {
            state.targetLeftFlap = 0;
            state.targetRightFlap = 0;
            playZipperSound();
        });

        resetTentBtn.addEventListener('click', () => {
            state.targetLeftFlap = 0;
            state.targetRightFlap = 0;
            state.leftFlapOpen = 0;
            state.rightFlapOpen = 0;
            playZipperSound();
            promptBubble.style.opacity = '1';
        });

        // Renders cockpit graphics underneath the tent flaps
        function drawDashboardRevealed(cx, cy, w, h) {
            // Dashboard Ambient Backlight Glow
            const glow = ctx.createRadialGradient(cx, cy, 30, cx, cy, 220);
            glow.addColorStop(0, 'rgba(8, 50, 64, 0.5)');
            glow.addColorStop(1, 'rgba(4, 6, 12, 0.95)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, w, h);

            // Subtle moving speed lines
            ctx.strokeStyle = 'rgba(6, 182, 212, 0.04)';
            ctx.lineWidth = 1;
            const lineOffset = (state.time * 24) % 50;
            for (let i = 0; i < 10; i++) {
                const ly = cy + i * 25 + lineOffset - 80;
                if (ly > cy - 20 && ly < h) {
                    ctx.beginPath();
                    ctx.moveTo(cx - (ly - cy) * 1.1, ly);
                    ctx.lineTo(cx + (ly - cy) * 1.1, ly);
                    ctx.stroke();
                }
            }

            // Draw Steel Handlebars
            const barY = cy + 130;
            ctx.strokeStyle = '#222533';
            ctx.lineWidth = 26;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cx - 240, barY - 15);
            ctx.bezierCurveTo(cx - 130, barY + 35, cx - 60, barY + 25, cx, barY + 20);
            ctx.bezierCurveTo(cx + 60, barY + 25, cx + 130, barY + 35, cx + 240, barY - 15);
            ctx.stroke();

            // Handlebars inner metallic overlay
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(cx - 240, barY - 15);
            ctx.bezierCurveTo(cx - 130, barY + 35, cx - 60, barY + 25, cx, barY + 20);
            ctx.bezierCurveTo(cx + 60, barY + 25, cx + 130, barY + 35, cx + 240, barY - 15);
            ctx.stroke();

            // Leather riding gloves
            drawHands(cx - 220, barY - 18, true);
            drawHands(cx + 220, barY - 18, false);

            // Round screen border frame
            ctx.fillStyle = '#060814';
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(cx, cy, 100, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Holographic digital speed indicator arc
            ctx.strokeStyle = 'rgba(6, 182, 212, 0.15)';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(cx, cy, 84, Math.PI * 0.75, Math.PI * 2.25);
            ctx.stroke();

            const speedPower = (state.leftFlapOpen + state.rightFlapOpen) / 2;
            const speedVal = speedPower * 65 + Math.sin(state.time * 5) * 2;
            const endAngle = Math.PI * 0.75 + (Math.PI * 1.5) * Math.min(1, speedPower);
            
            ctx.strokeStyle = '#06b6d4';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(cx, cy, 84, Math.PI * 0.75, endAngle);
            ctx.stroke();

            // Digital HUD numeric layout
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 42px "Orbitron"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(speedPower > 0.05 ? Math.round(speedVal) : "0", cx, cy - 8);

            ctx.fillStyle = '#06b6d4';
            ctx.font = '700 11px "Orbitron"';
            ctx.fillText("MPH", cx, cy + 24);

            ctx.fillStyle = '#22c55e';
            ctx.font = '700 13px "Orbitron"';
            ctx.fillText("READY", cx, cy + 44);

            ctx.fillStyle = '#64748b';
            ctx.font = '500 11px "Rajdhani"';
            ctx.fillText("ODO: 000800 KM", cx, cy + 62);
        }

        // Renders gloves wrapped on the motorcycle grips
        function drawHands(gx, gy, isLeft) {
            ctx.save();
            ctx.translate(gx, gy);
            if (!isLeft) ctx.scale(-1, 1);
            
            ctx.fillStyle = '#1e1f29';
            ctx.strokeStyle = '#3b4252';
            ctx.lineWidth = 3;

            // Fist shape
            ctx.beginPath();
            ctx.ellipse(0, 0, 30, 20, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Gripping fingers
            ctx.fillStyle = '#2e3440';
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(-16 + i * 10, -10, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
            ctx.restore();
        }

        // Draws the vector camping tent on top of the dashboard
        function drawTentStructure(cx, cy, w, h) {
            const topY = h * 0.15;
            const bottomY = h * 0.95;
            const tentWidth = w * 0.85;
            
            const leftBase = cx - tentWidth / 2;
            const rightBase = cx + tentWidth / 2;

            // Draw Tent Ground / Flooring (Warm soil orange color)
            ctx.fillStyle = '#944b1c';
            ctx.beginPath();
            ctx.moveTo(leftBase, bottomY);
            ctx.lineTo(rightBase, bottomY);
            ctx.lineTo(rightBase + 20, bottomY + 20);
            ctx.lineTo(leftBase - 20, bottomY + 20);
            ctx.closePath();
            ctx.fill();

            // Inner dark tent ceiling backing
            ctx.fillStyle = '#162414';
            ctx.beginPath();
            ctx.moveTo(cx, topY);
            ctx.lineTo(leftBase, bottomY);
            ctx.lineTo(rightBase, bottomY);
            ctx.closePath();
            ctx.fill();

            // Rigidity outer green panels
            const midLeftCorner = cx - tentWidth * 0.36;
            const midRightCorner = cx + tentWidth * 0.36;

            // Green Tent Outer Left Structural Wall
            ctx.fillStyle = '#46643c';
            ctx.beginPath();
            ctx.moveTo(cx, topY);
            ctx.lineTo(leftBase, bottomY);
            ctx.lineTo(midLeftCorner, bottomY);
            ctx.closePath();
            ctx.fill();

            // Green Tent Outer Right Structural Wall
            ctx.fillStyle = '#395331';
            ctx.beginPath();
            ctx.moveTo(cx, topY);
            ctx.lineTo(rightBase, bottomY);
            ctx.lineTo(midRightCorner, bottomY);
            ctx.closePath();
            ctx.fill();

            // Animate and draw Left Flap
            drawLeftFlapPath(cx, topY, bottomY, midLeftCorner);

            // Animate and draw Right Flap
            drawRightFlapPath(cx, topY, bottomY, midRightCorner);

            // Draw Central zipper closure structure
            if (state.leftFlapOpen < 0.98 || state.rightFlapOpen < 0.98) {
                // Zipper tracks down the center
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 3;
                ctx.beginPath();
                
                const zipperProgressY = topY + (bottomY - topY) * Math.max(state.leftFlapOpen, state.rightFlapOpen);
                ctx.moveTo(cx, zipperProgressY);
                ctx.lineTo(cx, bottomY);
                ctx.stroke();
            }

            // Outer Top Cap Ridge
            ctx.fillStyle = '#2a3d24';
            ctx.beginPath();
            ctx.moveTo(cx - 24, topY + 12);
            ctx.lineTo(cx, topY - 10);
            ctx.lineTo(cx + 24, topY + 12);
            ctx.closePath();
            ctx.fill();
        }

        // Custom Bezier coordinates for Left Fold
        function drawLeftFlapPath(cx, topY, bottomY, midLeftCorner) {
            const p = state.leftFlapOpen;
            ctx.fillStyle = '#557a46'; 

            ctx.beginPath();
            ctx.moveTo(cx, topY);

            if (p === 0) {
                ctx.lineTo(cx, bottomY);
                ctx.lineTo(midLeftCorner, bottomY);
                ctx.closePath();
                ctx.fill();
            } else {
                // Peeling geometry
                const destX = cx - (cx - midLeftCorner) * p;
                const destY = bottomY - (bottomY - topY) * 0.12 * p;

                ctx.lineTo(midLeftCorner, bottomY);
                ctx.lineTo(destX, destY);
                ctx.quadraticCurveTo(cx - (cx - midLeftCorner) * p * 0.4, topY + (bottomY - topY) * 0.5, cx, topY);
                ctx.closePath();
                ctx.fill();

                // Golden interior lining of flipped flap
                ctx.fillStyle = '#dca631';
                ctx.beginPath();
                ctx.moveTo(destX, destY);
                ctx.lineTo(destX + 16 * p, destY - 8 * p);
                ctx.quadraticCurveTo(cx - (cx - midLeftCorner) * p * 0.35, topY + (bottomY - topY) * 0.52, cx, topY);
                ctx.quadraticCurveTo(cx - (cx - midLeftCorner) * p * 0.4, topY + (bottomY - topY) * 0.5, destX, destY);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Custom Bezier coordinates for Right Fold
        function drawRightFlapPath(cx, topY, bottomY, midRightCorner) {
            const p = state.rightFlapOpen;
            ctx.fillStyle = '#3f5d34'; 

            ctx.beginPath();
            ctx.moveTo(cx, topY);

            if (p === 0) {
                ctx.lineTo(cx, bottomY);
                ctx.lineTo(midRightCorner, bottomY);
                ctx.closePath();
                ctx.fill();
            } else {
                // Peeling geometry
                const destX = cx + (midRightCorner - cx) * p;
                const destY = bottomY - (bottomY - topY) * 0.12 * p;

                ctx.lineTo(midRightCorner, bottomY);
                ctx.lineTo(destX, destY);
                ctx.quadraticCurveTo(cx + (midRightCorner - cx) * p * 0.4, topY + (bottomY - topY) * 0.5, cx, topY);
                ctx.closePath();
                ctx.fill();

                // Golden interior lining of flipped flap
                ctx.fillStyle = '#be8c21';
                ctx.beginPath();
                ctx.moveTo(destX, destY);
                ctx.lineTo(destX - 16 * p, destY - 8 * p);
                ctx.quadraticCurveTo(cx + (midRightCorner - cx) * p * 0.35, topY + (bottomY - topY) * 0.52, cx, topY);
                ctx.quadraticCurveTo(cx + (midRightCorner - cx) * p * 0.4, topY + (bottomY - topY) * 0.5, destX, destY);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Animates transitions, physics interpolations, and handles constant updates
        function render() {
            state.time += 0.02;
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);

            // Interpolate flap open speeds using smooth exponential spring curves
            if (!state.isDragging) {
                state.leftFlapOpen += (state.targetLeftFlap - state.leftFlapOpen) * 0.12;
                state.rightFlapOpen += (state.targetRightFlap - state.rightFlapOpen) * 0.12;
            }

            // Clean background draw
            ctx.fillStyle = '#080911';
            ctx.fillRect(0, 0, w, h);

            const cx = w / 2;
            const cy = h * 0.5;

            // Draw background Cockpit (revealed underneath)
            drawDashboardRevealed(cx, cy, w, h);

            // Draw overlay Tent
            drawTentStructure(cx, cy, w, h);

            // Modulate engine volume
            updateBackgroundHum();

            requestAnimationFrame(render);
        }

        // Kick off continuous animation loop
        render();

    </script>
